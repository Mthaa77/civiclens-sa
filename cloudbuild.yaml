# CivicLens SA — Cloud Build Configuration
# Deploy to Cloud Run with automated CI/CD

steps:
  # Step 1: Install dependencies
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'gcr.io/$PROJECT_ID/civiclens-sa:$COMMIT_SHA',
        '-t',
        'gcr.io/$PROJECT_ID/civiclens-sa:latest',
        '--cache-from',
        'gcr.io/$PROJECT_ID/civiclens-sa:latest',
        '.',
      ]

  # Step 2: Push container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/civiclens-sa']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      [
        'run',
        'deploy',
        'civiclens-sa',
        '--image',
        'gcr.io/$PROJECT_ID/civiclens-sa:$COMMIT_SHA',
        '--region',
        'africa-south1',
        '--platform',
        'managed',
        '--allow-unauthenticated',
        '--port',
        '3000',
        '--memory',
        '1Gi',
        '--cpu',
        '1',
        '--min-instances',
        '1',
        '--max-instances',
        '10',
        '--set-env-vars',
        'NODE_ENV=production',
        '--set-env-vars',
        'NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}',
        '--set-env-vars',
        'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}',
        '--set-env-vars',
        'NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}',
        '--set-env-vars',
        'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}',
        '--set-env-vars',
        'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}',
        '--set-env-vars',
        'NEXT_PUBLIC_FIREBASE_APP_ID=${_NEXT_PUBLIC_FIREBASE_APP_ID}',
        '--set-env-vars',
        'NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${_NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID}',
        '--set-secrets',
        'FIREBASE_PROJECT_ID=firebase-project-id:latest',
        '--set-secrets',
        'FIREBASE_CLIENT_EMAIL=firebase-client-email:latest',
        '--set-secrets',
        'FIREBASE_PRIVATE_KEY=firebase-private-key:latest',
        '--set-secrets',
        'DATABASE_URL=database-url:latest',
      ]

# Substitution variables (set in Cloud Build trigger or UI)
substitutions:
  _NEXT_PUBLIC_FIREBASE_API_KEY: ''
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ''
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: ''
  _NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ''
  _NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ''
  _NEXT_PUBLIC_FIREBASE_APP_ID: ''
  _NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ''

images:
  - 'gcr.io/$PROJECT_ID/civiclens-sa:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/civiclens-sa:latest'
